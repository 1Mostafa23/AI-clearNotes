

services:
  db:
    image: postgres:17 
    container_name: ai_journal_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: journal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_journal_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: